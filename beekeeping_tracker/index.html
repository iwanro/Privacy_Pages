<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beekeeping Tracker - Index</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .loader {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0; opacity: 0.9; }

        .content-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            transition: background 0.2s;
            border-radius: 8px;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .file-item:last-child { border-bottom: none; }
        .file-icon { margin-right: 15px; font-size: 1.2rem; }
        
        .cancel-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="spinner"></div>
        <h1>Beekeeping Tracker</h1>
        <p id="status">Detecting language...</p>
        <button class="cancel-btn" onclick="stopRedirect()">Stop Auto-Redirect</button>
    </div>

    <div class="content-card">
        <div id="list-container" class="file-list">
            <p style="text-align: center;">Se încarcă fișierele...</p>
        </div>
    </div>

    <script>
        // --- CONFIGURARE ---
        // Asigură-te că aceste două sunt corecte pentru ca API-ul să poată citi lista
        const USER = 'iwanro'; 
        const REPO = 'Privacy_Pages';
        
        let redirectTimer;

        function initRedirect() {
            const userLang = navigator.language || navigator.userLanguage;
            const langCode = userLang.split('-')[0];
            const supportedLangs = { 'ro': 'privacy_ro.html', 'en': 'privacy_en.html' };
            const targetPage = supportedLangs[langCode] || 'privacy_en.html';

            document.getElementById('status').innerText = `Redirecting to ${targetPage} in 3s...`;

            redirectTimer = setTimeout(() => {
                window.location.href = targetPage;
            }, 3000);
        }

        function stopRedirect() {
            clearTimeout(redirectTimer);
            document.getElementById('status').innerText = "Auto-redirect cancelled.";
            document.querySelector('.spinner').style.display = 'none';
        }

        async function loadRepoFiles() {
            const container = document.getElementById('list-container');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const files = await response.json();

                if (!response.ok) throw new Error();

                container.innerHTML = '';

                files.forEach(file => {
                    // Ignorăm index.html și fișierele ascunse
                    if (file.name === 'index.html' || file.name.startsWith('.')) return;

                    const icon = file.type === 'dir' ? '📁' : '📄';
                    const item = document.createElement('a');
                    item.className = 'file-item';
                    
                    // MODIFICAREA CHEIE:
                    // În loc de file.html_url (care e pe GitHub), 
                    // folosim file.path sau file.name pentru a rămâne pe domeniul Vercel
                    item.href = "./" + file.name; 
                    
                    item.innerHTML = `<span class="file-icon">${icon}</span> <span>${file.name}</span>`;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = '<p style="text-align:center;">Eroare la listare. Verifică USER/REPO în cod.</p>';
            }
        }

        initRedirect();
        loadRepoFiles();
    </script>
</body>
</html>
