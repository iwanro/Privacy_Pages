<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beekeeping Tracker - Legal Documents</title>
    <script>
        // Auto-detect browser language and redirect
        (function() {
            var userLang = navigator.language || navigator.userLanguage;
            var langCode = userLang.split('-')[0]; // Get primary language code

            // Map supported languages
            var supportedLangs = {
                'ro': 'privacy_ro.html',
                'en': 'privacy_en.html'
            };

            // Redirect to appropriate language or default to English
            var targetPage = supportedLangs[langCode] || 'privacy_en.html';
            window.location.href = targetPage;
        })();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        p {
            margin: 5px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>Beekeeping Tracker</h1>
        <p>Loading legal documents...</p>
        <p style="font-size: 14px;">Încărcare documentelor legale...</p>
    </div>
</body>
</html>
